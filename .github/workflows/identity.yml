name: Identity

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify README identity (PRIM-001)
        run: |
          set -euo pipefail
          grep -q "^# ORIGINSEAL$" README.md || { echo "FAIL: title missing"; exit 1; }
          grep -q "^Primitive ID: PRIM-001" README.md || { echo "FAIL: PRIM-001 not found"; exit 1; }
          grep -q "^Package: @verifrax/originseal" README.md || { echo "FAIL: package line missing"; exit 1; }
          grep -q "^Binary: originseal" README.md || { echo "FAIL: binary line missing"; exit 1; }
          echo "PASS: PRIM-001 identity verified"
